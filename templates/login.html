{% extends 'base.html' %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-icon"><i class="ti ti-pill" aria-hidden="true"></i></div>
            <div class="logo-text">Med<span>Track</span></div>
        </div>
        <div class="auth-subtitle">Sign in to manage your medications</div>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>
            <button class="btn-submit" style="width:100%; padding:12px;" type="submit">Sign In</button>
        </form>
        <div class="auth-footer">Don't have an account? <a href="{{ url_for('register') }}">Register</a></div>
    </div>
</div>
{% endblock %}
